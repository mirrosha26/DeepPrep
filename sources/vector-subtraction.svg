<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#ffffff" />
  <defs>
    <marker id="arrowhead" markerUnits="strokeWidth" markerWidth="8" markerHeight="5.6" refX="7.2" refY="2.8" orient="auto">
      <polygon points="0 0, 8 2.8, 0 5.6" fill="#1a1a1a" />
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f0f0f0" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <g stroke="#1a1a1a" stroke-width="2" marker-end="url(#arrowhead)">
    <line x1="120" y1="240" x2="320" y2="120" />
    <line x1="120" y1="240" x2="200" y2="40" />
    <line x1="200" y1="40" x2="320" y2="120" stroke-width="3" />
  </g>

  <style>.label { font: italic 18px serif; fill: #1a1a1a; }</style>
  <text x="240" y="210" class="label">a</text>
  <line x1="240" y1="195" x2="250" y2="195" stroke="#1a1a1a" stroke-width="1" />
  <text x="140" y="120" class="label">b</text>
  <line x1="140" y1="105" x2="150" y2="105" stroke="#1a1a1a" stroke-width="1" />
  <text x="270" y="70" class="label">a - b</text>
  <line x1="269" y1="55" x2="279" y2="55" stroke="#1a1a1a" stroke-width="1" />
  <line x1="293" y1="55" x2="303" y2="55" stroke="#1a1a1a" stroke-width="1" />
</svg>
