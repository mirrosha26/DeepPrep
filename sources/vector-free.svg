<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#ffffff" />
  
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f0f0f0" stroke-width="1"/>
    </pattern>
    <marker id="arrowhead" markerUnits="strokeWidth" markerWidth="8" markerHeight="5.6" refX="7.2" refY="2.8" orient="auto">
      <polygon points="0 0, 8 2.8, 0 5.6" fill="#1a1a1a" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <g stroke="#1a1a1a" stroke-width="2" marker-end="url(#arrowhead)">
    <line x1="50" y1="80" x2="130" y2="40" />
    <line x1="220" y1="120" x2="300" y2="80" />
    <line x1="80" y1="220" x2="160" y2="180" />
    <line x1="250" y1="240" x2="330" y2="200" />
  </g>

  <style>
    .vector-label { font: italic 16px serif; fill: #1a1a1a; }
  </style>
  <text x="90" y="35" class="vector-label">a</text>
  <line x1="90" y1="21" x2="99" y2="21" stroke="#1a1a1a" stroke-width="1" />
  <text x="260" y="75" class="vector-label">a</text>
  <line x1="260" y1="61" x2="269" y2="61" stroke="#1a1a1a" stroke-width="1" />
  <text x="120" y="175" class="vector-label">a</text>
  <line x1="120" y1="161" x2="129" y2="161" stroke="#1a1a1a" stroke-width="1" />
  <text x="290" y="195" class="vector-label">a</text>
  <line x1="290" y1="181" x2="299" y2="181" stroke="#1a1a1a" stroke-width="1" />
  
</svg>
