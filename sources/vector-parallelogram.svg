<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#ffffff" />
  <defs>
    <marker id="arrowhead" markerUnits="strokeWidth" markerWidth="8" markerHeight="5.6" refX="7.2" refY="2.8" orient="auto">
      <polygon points="0 0, 8 2.8, 0 5.6" fill="#1a1a1a" />
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f0f0f0" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <g stroke="#1a1a1a" stroke-width="1" stroke-dasharray="5,5">
    <line x1="240" y1="80" x2="320" y2="40" />
    <line x1="160" y1="200" x2="320" y2="40" />
  </g>

  <g stroke="#1a1a1a" stroke-width="2" marker-end="url(#arrowhead)">
    <line x1="80" y1="240" x2="240" y2="80" />
    <line x1="80" y1="240" x2="160" y2="200" />
    <line x1="80" y1="240" x2="320" y2="40" stroke-width="3" />
  </g>

  <style>.label { font: italic 18px serif; fill: #1a1a1a; }</style>
  <text x="140" y="150" class="label">a</text>
  <line x1="140" y1="135" x2="150" y2="135" stroke="#1a1a1a" stroke-width="1" />
  <text x="110" y="235" class="label">b</text>
  <line x1="110" y1="220" x2="120" y2="220" stroke="#1a1a1a" stroke-width="1" />
  <text x="195" y="155" class="label">a + b</text>
  <line x1="194" y1="140" x2="204" y2="140" stroke="#1a1a1a" stroke-width="1" />
  <line x1="221" y1="140" x2="231" y2="140" stroke="#1a1a1a" stroke-width="1" />
</svg>
