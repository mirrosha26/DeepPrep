<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#ffffff" />
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f0f0f0" stroke-width="1"/>
    </pattern>
    <marker id="arrowhead" markerUnits="strokeWidth" markerWidth="8" markerHeight="5.6" refX="7.2" refY="2.8" orient="auto">
      <polygon points="0 0, 8 2.8, 0 5.6" fill="#1a1a1a" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <g stroke="#1a1a1a" stroke-width="2" marker-end="url(#arrowhead)">
    <line x1="80" y1="200" x2="200" y2="160" />
    <line x1="200" y1="160" x2="280" y2="40" />
    <line x1="80" y1="200" x2="280" y2="40" stroke-width="3" />
  </g>

  <style>.label { font: italic 18px serif; fill: #1a1a1a; }</style>
  <text x="130" y="200" class="label">a</text>
  <line x1="130" y1="185" x2="140" y2="185" stroke="#1a1a1a" stroke-width="1" />
  <text x="250" y="120" class="label">b</text>
  <line x1="250" y1="105" x2="260" y2="105" stroke="#1a1a1a" stroke-width="1" />
  <text x="150" y="100" class="label">a + b</text>
  <line x1="149" y1="83" x2="159" y2="83" stroke="#1a1a1a" stroke-width="1" />
  <line x1="174" y1="83" x2="184" y2="83" stroke="#1a1a1a" stroke-width="1" />
</svg>
